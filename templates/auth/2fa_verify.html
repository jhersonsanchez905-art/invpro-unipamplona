{% extends "base.html" %}
{% block title %}Verificar 2FA{% endblock %}
{% block content %}
<div style="max-width:380px;margin:60px auto">
  <div class="panel" style="padding:32px">
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:48px;height:48px;border-radius:50%;
        background:#FDF2F2;display:flex;align-items:center;
        justify-content:center;margin:0 auto 12px">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="#AD3333" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"
            stroke-linecap="round"/>
        </svg>
      </div>
      <div class="ph-title" style="font-size:16px">
        Verificación en dos pasos
      </div>
      <div class="ph-sub" style="margin-top:4px">
        Ingresa el código de Google Authenticator
      </div>
    </div>

    {% if messages %}
    {% for msg in messages %}
    <div style="background:#FEE2E2;border-radius:8px;padding:8px 12px;
      font-size:12px;color:#991B1B;margin-bottom:16px;text-align:center">
      {{ msg }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <input type="text" name="token" maxlength="6"
        placeholder="000 000" autofocus required
        style="width:100%;border:1px solid #F0E0E0;border-radius:8px;
        padding:12px 14px;font-size:24px;text-align:center;
        font-family:'JetBrains Mono',monospace;
        letter-spacing:0.3em;outline:none;margin-bottom:16px">
      <button type="submit" class="btn btn-primary"
        style="width:100%;justify-content:center;padding:10px">
        Verificar
      </button>
    </form>
  </div>
</div>
{% endblock %}
