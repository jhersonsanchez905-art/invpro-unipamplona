{% extends "base.html" %}

{% block title %}Mi Inventario · InvPro{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto p-8">
    <header class="flex items-center justify-between mb-12">
        <div>
            <h1 class="text-4xl font-bold text-red-700">InvPro</h1>
            <p class="text-slate-500">Panel de Cliente · Unipamplona</p>
        </div>
        <div class="flex items-center space-x-4">
            <div class="text-right">
                <p class="font-bold">{{ request.user.username }}</p>
                <a href="{% url 'logout' %}" class="text-sm text-red-600 hover:underline">Cerrar sesión</a>
            </div>
            <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center text-red-700 font-bold text-xl">
                {{ request.user.username|slice:":1"|upper }}
            </div>
        </div>
    </header>

{% endblock %}
