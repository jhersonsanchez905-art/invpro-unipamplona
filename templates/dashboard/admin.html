{% extends "base.html" %}

{% block title %}Dashboard Administrativo · InvPro{% endblock %}

{% block content %}
<div class="flex h-screen">

        <div class="p-4 border-t border-slate-100">
            <div class="flex items-center space-x-3 p-2">
                <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-700 font-bold">
                    {{ request.user.username|slice:":1"|upper }}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold truncate">{{ request.user.username }}</p>
                    <p class="text-xs text-slate-500 truncate">Administrador</p>
                </div>
            </div>
            <a href="{% url 'logout' %}" class="mt-4 flex items-center justify-center space-x-2 p-2 w-full text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                <span>Cerrar Sesión</span>
            </a>
        </div>
    </aside>

   {% endblock %}
